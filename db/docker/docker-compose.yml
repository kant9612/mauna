# version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mauna-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mauna}
      MYSQL_USER: ${MYSQL_USER:-mauna_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mauna_pass}
      TZ: 'Asia/Tokyo'
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - mauna-network

volumes:
  mysql_data:

networks:
  mauna-network:
    driver: bridge
